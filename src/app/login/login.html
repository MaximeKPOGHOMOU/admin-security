<div class="login-page">

  <div class="login-card">

    <!-- Partie gauche : Formulaire -->
    <div class="login-form">

      <h2>Connexion</h2>
      <p class="subtitle">Accédez à votre espace sécurisé</p>

      <form>

        <div class="form-group">


          <div class="input-icon">
            <span class="material-symbols-rounded">mail</span>
            <input type="email" placeholder="email@exemple.com">
          </div>

        </div>


        <div class="form-group">


          <div class="input-icon password-field">

            <span class="material-symbols-rounded">lock</span>

            <input [type]="showPassword ? 'text' : 'password'" placeholder="********">

            <span class="material-symbols-rounded eye-icon" (click)="togglePassword()">
              {{ showPassword ? 'visibility' : 'visibility_off' }}
            </span>

          </div>

        </div>

        <div class="login-options">

         <div class="form-check form-switch d-flex align-items-center mb-3">
                    <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                    <label class="form-check-label mb-0 ms-3" for="rememberMe"> Se souvenir de moi</label>
                  </div>
        </div>

        <button class="login-btn">
          Se connecter
        </button>

      </form>

    </div>


    <!-- Partie droite : Image -->
    <div class="login-image">

      <div class="overlay">
        <h2>Bienvenue 👋</h2>
        <p>
          Gérez facilement vos collaborateurs, suivez vos activités
          et contrôlez votre système en toute sécurité.
        </p>
      </div>

    </div>

  </div>

</div>
