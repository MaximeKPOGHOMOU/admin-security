<div class="login-page">

  <div class="login-card">

    <!-- Partie gauche : Formulaire -->
    <div class="login-form">

      <div class="zaly-container">
        <h2>Authentifiez-vous</h2>
        <p>Utilisez votre email et votre mot de passe. </p>
      </div>
      <form>

        <div class="form-group">
          <div class="input-icon">
            <span class="material-symbols-rounded">mail</span>
            <input type="email" placeholder="exemple@gmail.com">
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon password-field">
            <span class="material-symbols-rounded">lock</span>
            <input [type]="showPassword ? 'text' : 'password'" placeholder="********">
            <span class="material-symbols-rounded eye-icon" (click)="togglePassword()">
              {{ showPassword ? 'visibility' : 'visibility_off' }}
            </span>
          </div>
        </div>

        <div class="login-options">
          <div class="form-check form-switch d-flex align-items-center mb-3">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label mb-0 ms-2" for="rememberMe">
              Se souvenir de moi
            </label>
          </div>
          <a href="">Mot de passe oublié?</a>
        </div>

        <!-- Bouton Se connecter -->
        <button class="login-btn">
          Entrer
          <span class="material-symbols-rounded" style="vertical-align: middle; margin-right: 5px;">
             arrow_forward
          </span>
        </button>

        <!-- Séparateur avec "ou" -->
        <div class="separator">
          <span>ou</span>
        </div>

        <!-- Bouton Continuer avec Google -->
        <button type="button" class="google-btn">
          <img src="assets/img/logos/goo.png" alt="Google logo" />
          Continuer avec Google
        </button>

        <div class="register-link">
          <span>Vous êtes nouveau ?</span>
          <a [routerLink]="['/register']">Créer un compte.</a>
        </div>

      </form>

    </div>

  </div>

</div>
