<form class="form-container">

  <!-- En-tête coloré -->
  <div class="form-header bg-gradient-dark shadow-dark">
    <h2>Ajouter un Personnel</h2>
    <p>Renseignez les informations du personnel</p>
  </div>

  <div class="form-grid">

    <!-- Ligne 1 : Nom + Prénom -->
    <div class="form-row">
      <div class="input-icon">
        <input type="text" placeholder="Nom">
      </div>
      <div class="input-icon">
        <input type="text" placeholder="Prénom">
      </div>
    </div>

    <!-- Ligne 2 : Email + Téléphone -->
    <div class="form-row">
      <div class="input-icon">
        <input type="email" placeholder="Email">
      </div>
      <div class="input-icon">
        <input type="text" placeholder="Téléphone">
      </div>
    </div>

    <!-- Ligne 3 : Poste + Département -->
    <div class="form-row">
      <div class="input-icon">
        <input type="text" placeholder="Poste">
      </div>
      <div class="input-icon">
        <input type="text" placeholder="Département / Service">
      </div>
    </div>

    <!-- Ligne 4 : Adresse + Date de naissance -->
    <div class="form-row">
      <div class="input-icon">
        <input type="text" placeholder="Adresse">
      </div>
      <div class="input-icon date-icon">
        <input type="date" placeholder="Date de naissance">

      </div>
    </div>

    <!-- Ligne 5 : Sexe + Type de contrat -->
    <div class="form-row">
      <div class="input-icon">
        <select>
          <option value="" disabled selected>Sexe</option>
          <option value="M">Masculin</option>
          <option value="F">Féminin</option>
        </select>
      </div>
      <div class="input-icon">
        <select>
          <option value="" disabled selected>Type de contrat</option>
          <option value="CDI">CDI</option>
          <option value="CDD">CDD</option>
          <option value="Temporaire">Temporaire</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <!-- Upload photo -->
      <div class="file-upload" style="flex: 1;">
        <div class="upload-container">
          <div class="upload-button bg-gradient-info" (click)="photoInput.click()">
            <i class="material-symbols-rounded">upload_file</i>
          </div>
          <div class="upload-filename">
            <span>{{ selectedPhotoName || 'Sélectionné la photo' }}</span>
          </div>
          <input type="file" #photoInput hidden (change)="onPhotoSelected($event)">
        </div>
      </div>
      <!-- Upload pièce -->
      <div class="file-upload" style="flex: 1; ">
        <div class="upload-container">
          <div class="upload-button bg-gradient-info" (click)="pieceInput.click()">
            <i class="material-symbols-rounded">upload_file</i>
            <span class="upload-text-mobile">Choisir une pièce</span>
          </div>
          <div class="upload-filename">
            {{ selectedPieceName || 'Sélectionné la pièce' }}
          </div>
          <input type="file" #pieceInput hidden (change)="onPieceSelected($event)">
        </div>
      </div>
    </div>

    <!-- Ligne 7 : Boutons -->
    <div class="form-actions">
      <button type="button" matTooltip="Annuler" class="btn btn-primary" (click)="closeDialog()">Annuler</button>
      <button type="button" matTooltip="Ajouter" class="btn bg-gradient-dark">Enregistrer</button>
    </div>

  </div>
</form>
