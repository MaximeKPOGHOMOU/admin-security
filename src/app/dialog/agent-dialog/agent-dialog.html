<form >

  <!-- Nom complet -->
  <div class="form-group mb-3">
    <label for="nom">Nom</label>
    <input type="text" id="nom" formControlName="nom" class="form-control" placeholder="Nom complet">
  </div>

  <!-- Email -->
  <div class="form-group mb-3">
    <label for="email">Email</label>
    <input type="email" id="email" formControlName="email" class="form-control" placeholder="email@exemple.com">
  </div>

  <!-- Fonction -->
  <div class="form-group mb-3">
    <label for="fonction">Fonction</label>
    <input type="text" id="fonction" formControlName="fonction" class="form-control" placeholder="Ex: Manager">
  </div>

  <!-- Statut -->
  <div class="form-group mb-3">
    <label for="statut">Statut</label>
    <select id="statut" formControlName="statut" class="form-select">
      <option value="En ligne">En ligne</option>
      <option value="Hors ligne">Hors ligne</option>
    </select>
  </div>

  <!-- Date d'embauche -->
  <div class="form-group mb-3">
    <label for="dateEmbauche">Date d'embauche</label>
    <input type="date" id="dateEmbauche" formControlName="dateEmbauche" class="form-control">
  </div>

  <!-- Boutons -->
  <div class="d-flex justify-content-end">
    <button type="button" class="btn btn-secondary me-2" >Annuler</button>
    <button type="submit" class="btn btn-primary">
       Ajouter
    </button>
  </div>
</form>
