<form class="form-container">

  <!-- En-tête coloré -->
  <div class="form-header bg-gradient-dark shadow-dark">
    <h2>Ajouter un site</h2>
    <p>Renseignez les informations du site</p>
  </div>

  <div class="form-grid">

    <!-- Ligne 1 : Nom + Prénom -->
    <div class="form-row">
      <div class="input-icon">
        <input type="text" placeholder="Nom du site">
      </div>
      <div class="input-icon">
        <input type="text" placeholder="Client">
      </div>
    </div>

    <!-- Ligne 2 : Email + Téléphone -->
    <div class="form-row">
      <div class="input-icon">
        <input type="text" placeholder="Adresse">
      </div>
      <div class="input-icon">
        <input type="text" placeholder="Contact d'urgence">
      </div>
    </div>

    <!-- Ligne 4 : Adresse + Date de naissance -->
    <div class="form-row">
      <div class="input-icon">
        <input type="text" placeholder="Type de site">
      </div>
      <div class="input-icon">
        <input type="text" placeholder="Type de site">
      </div>
    </div>


    <!-- Ligne 7 : Boutons -->
    <div class="form-actions">
      <button type="button" matTooltip="Annuler" class="btn btn-primary" (click)="closeDialog()">Annuler</button>
      <button type="button" matTooltip="Ajouter" class="btn bg-gradient-dark">Enregistrer</button>
    </div>

  </div>
</form>
