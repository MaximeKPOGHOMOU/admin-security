<main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
    <div class="container-fluid py-2">
        <div class="row">
            <div class="header-row mb-4">
                <h3 class="h4 mb-0 fw-bold">Gestion des agents</h3>
                <button type="button" matTooltip="Ajouter un agent" class="btn btn-primary"
                    (click)="openAddAgentDialog()"><i class="material-symbols-rounded">add</i></button>
            </div>
            <div class="col-12">
                <div class="card my-4">
                    <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                        <div
                            class="bg-gradient-dark shadow-dark border-radius-lg pt-3 pb-3 px-3 d-flex justify-content-between align-items-center">
                            <h6 class="text-white text-capitalize mb-0 fw-normal">
                                Liste des agents
                            </h6>
                        </div>
                    </div>
                    <div class="container py-4">
                        <div class="row g-3">
                            <!-- Carte 1 -->
                            <div class="col-12 col-sm-6 col-md-6 col-lg-3">
                                <div class="card card-agent shadow-sm border-0 text-center p-2">
                                    <div class="avatar avatar-md mx-auto mb-2">
                                        <img src="assets/img/team-2.jpg" alt="John Michael" class="rounded-circle w-75">
                                    </div>
                                    <h6 class="card-title mb-1">John Michael</h6>
                                    <p class="text-muted mb-1 text-xs">Manager - Organisation</p>
                                    <div class="text-center mb-2">
                                        <span class="badge bg-success">En ligne</span>
                                    </div>
                                    <p class="text-secondary mb-2 text-xs">Embauché le 23/04/18</p>
                                    <div class="d-flex justify-content-center gap-2">
                                        <div class="d-flex justify-content-center gap-2">
                                            <!-- Modifier (icône carré avec stylo) -->
                                            <button type="button" matTooltip="Modifier"
                                                style="background: none; border: none; color: #0d6efd; padding: 0; cursor: pointer;">
                                                <i class="material-symbols-rounded"
                                                    style="font-size: 1.5rem;">edit_square</i>
                                            </button>

                                            <!-- Voir (icône œil) -->
                                            <button type="button" matTooltip="Voir"
                                                style="background: none; border: none; color: #11ad0c; padding: 0; cursor: pointer;">
                                                <i class="material-symbols-rounded"
                                                    style="font-size: 1.5rem;">visibility</i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Carte 2 -->
                            <div class="col-12 col-sm-6 col-md-6 col-lg-3">
                                <div class="card card-agent shadow-sm border-0 text-center p-2">
                                    <div class="avatar avatar-md mx-auto mb-2">
                                        <img src="assets/img/team-1.jpg" alt="Jane Doe" class="rounded-circle w-75">
                                    </div>
                                    <h6 class="card-title mb-1">Jane Doe</h6>
                                    <p class="text-muted mb-1 text-xs">Développeuse - IT</p>
                                    <div class="text-center mb-2">
                                        <span class="badge bg-warning">Hors ligne</span>
                                    </div>
                                    <p class="text-secondary mb-2 text-xs">Embauchée le 12/06/20</p>
                                    <div class="d-flex justify-content-center gap-2">
                                        <!-- Modifier (icône carré avec stylo) -->
                                        <button type="button" matTooltip="Modifier"
                                            style="background: none; border: none; color: #0d6efd; padding: 0; cursor: pointer;">
                                            <i class="material-symbols-rounded"
                                                style="font-size: 1.5rem;">edit_square</i>
                                        </button>

                                        <!-- Voir (icône œil) -->
                                        <button type="button" matTooltip="Voir"
                                            style="background: none; border: none; color: #11ad0c; padding: 0; cursor: pointer;">
                                            <i class="material-symbols-rounded"
                                                style="font-size: 1.5rem;">visibility</i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Carte 3 -->
                            <div class="col-12 col-sm-6 col-md-6 col-lg-3">
                                <div class="card card-agent shadow-sm border-0 text-center p-2">
                                    <div class="avatar avatar-md mx-auto mb-2">
                                        <img src="assets/img/team-3.jpg" alt="Alice Smith" class="rounded-circle w-75">
                                    </div>
                                    <h6 class="card-title mb-1">Alice Smith</h6>
                                    <p class="text-muted mb-1 text-xs">RH - Ressources</p>
                                    <div class="text-center mb-2">
                                        <span class="badge bg-success">En ligne</span>
                                    </div>
                                    <p class="text-secondary mb-2 text-xs">Embauchée le 05/08/21</p>
                                    <div class="d-flex justify-content-center gap-2">
                                        <!-- Modifier (icône carré avec stylo) -->
                                        <button type="button" matTooltip="Modifier"
                                            style="background: none; border: none; color: #0d6efd; padding: 0; cursor: pointer;">
                                            <i class="material-symbols-rounded"
                                                style="font-size: 1.5rem;">edit_square</i>
                                        </button>

                                        <!-- Voir (icône œil) -->
                                        <button type="button" matTooltip="Voir"
                                            style="background: none; border: none; color: #11ad0c; padding: 0; cursor: pointer;">
                                            <i class="material-symbols-rounded"
                                                style="font-size: 1.5rem;">visibility</i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-sm-6 col-md-6 col-lg-3">
                                <div class="card card-agent shadow-sm text-center p-2">
                                    <div class="avatar avatar-md mx-auto mb-2">
                                        <img src="assets/img/team-4.jpg" alt="Bob Johnson" class="rounded-circle w-75">
                                    </div>
                                    <h6 class="card-title mb-1">Bob Johnson</h6>
                                    <p class="text-muted mb-1 text-xs">Support - IT</p>
                                    <div class="text-center mb-2">
                                        <span class="badge bg-warning">Hors ligne</span>
                                    </div>
                                    <p class="text-secondary mb-2 text-xs">Embauché le 17/01/19</p>
                                    <div class="d-flex justify-content-center gap-2">
                                        <!-- Modifier (icône carré avec stylo) -->
                                        <button type="button" matTooltip="Modifier"
                                            style="background: none; border: none; color: #0d6efd; padding: 0; cursor: pointer;">
                                            <i class="material-symbols-rounded"
                                                style="font-size: 1.5rem;">edit_square</i>
                                        </button>

                                        <!-- Voir (icône œil) -->
                                        <button type="button" matTooltip="Voir"
                                            style="background: none; border: none; color: #11ad0c; padding: 0; cursor: pointer;">
                                            <i class="material-symbols-rounded"
                                                style="font-size: 1.5rem;">visibility</i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
